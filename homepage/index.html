      function getStrings(lang) { return STRINGS[lang] || STRINGS['zh-TW']; }

      function detectLangFromPath() {
        var seg = window.location.pathname.split('/')[1];
        return SUPPORTED_LANGS.indexOf(seg) !== -1 ? seg : null;
      }

      function renderForLang(lang) {
        document.documentElement.lang = lang;

        var s = getStrings(lang);
        document.getElementById('hero-title').textContent = s.heroTitle;
        document.getElementById('hero-tagline').textContent = s.heroTagline;
        document.getElementById('avalon-title').textContent = s.avalonTitle;
        document.getElementById('avalon-desc').textContent = s.avalonDesc;
        document.getElementById('avalon-tag').textContent = s.avalonTag;
        document.getElementById('avalon-card').href = '/' + lang + '/avalon/';
        document.getElementById('buzzer-title').textContent = s.buzzerTitle;
        document.getElementById('buzzer-desc').textContent = s.buzzerDesc;
        document.getElementById('buzzer-tag').textContent = s.buzzerTag;

        // 依語言更新 title / description / OG 標籤，而不是永遠停留在寫死的預設值
        var canonicalUrl = window.location.origin + '/' + lang + '/';
        document.title = s.seoTitle;

        var descTag = document.querySelector('meta[name="description"]');
        if (descTag) descTag.setAttribute('content', s.seoDesc);

        var canonicalTag = document.querySelector('link[rel="canonical"]');
        if (canonicalTag) canonicalTag.setAttribute('href', canonicalUrl);

        var ogTitleTag = document.querySelector('meta[property="og:title"]');
        if (ogTitleTag) ogTitleTag.setAttribute('content', s.seoTitle);

        var ogDescTag = document.querySelector('meta[property="og:description"]');
        if (ogDescTag) ogDescTag.setAttribute('content', s.seoDesc);

        var ogUrlTag = document.querySelector('meta[property="og:url"]');
        if (ogUrlTag) ogUrlTag.setAttribute('content', canonicalUrl);

        if (typeof gtag === 'function') {
          gtag('event', 'page_view', {
            page_title: s.seoTitle,
            page_location: canonicalUrl,
            page_path: '/' + lang + '/',
          });
        }

        var select = document.getElementById('lang-switcher');
        select.value = lang;
      }

      (function init() {
        var lang = detectLangFromPath();

        if (!lang) {
          var saved = window.localStorage.getItem('web100-lang');
          var target = SUPPORTED_LANGS.indexOf(saved) !== -1 ? saved : DEFAULT_LANG;
          window.location.replace('/' + target + '/');
          return;
        }

        window.localStorage.setItem('web100-lang', lang);

        // 語言下拉選單（選項只需建立一次）
        var select = document.getElementById('lang-switcher');
        SUPPORTED_LANGS.forEach(function (code) {
          var opt = document.createElement('option');
          opt.value = code;
          opt.textContent = LANG_LABELS[code];
          select.appendChild(opt);
        });

        renderForLang(lang);

        select.addEventListener('change', function (e) {
          var nextLang = e.target.value;
          window.localStorage.setItem('web100-lang', nextLang);
          window.history.pushState({}, '', '/' + nextLang + '/');
          renderForLang(nextLang);
        });

        var themeBtn = document.getElementById('theme-toggle');
        function applyTheme(theme) {
          var resolved = theme;
          if (theme === 'system') {
            resolved = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          }
          document.body.classList.toggle('light', resolved === 'light');
          themeBtn.textContent = resolved === 'light' ? '☀️' : '🌙';
        }
        var storedTheme = window.localStorage.getItem('web100-theme') || 'system';
        applyTheme(storedTheme);
        themeBtn.addEventListener('click', function () {
          var current = window.localStorage.getItem('web100-theme') || 'system';
          var resolved = current === 'system'
            ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
            : current;
          var next = resolved === 'light' ? 'dark' : 'light';
          window.localStorage.setItem('web100-theme', next);
          applyTheme(next);
        });
      })();
    </script>
