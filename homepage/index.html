<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f172a" />
    <title>Web100 | 一系列免安裝的小遊戲與實用工具</title>
    <meta name="description" content="Web100 是一系列免安裝、免註冊、手機瀏覽器直接使用的小遊戲與實用工具，第一款作品是阿瓦隆語音主持。" />
    <style>
      :root {
        /* Design tokens — 與 web100-architecture.md 第 5.2 節保持一致 */
        --color-bg: #0f172a;
        --color-bg-card: #1e293b;
        --color-text: #f1f5f9;
        --color-text-muted: #94a3b8;
        --color-accent: #6366f1;
        --color-border: #334155;

        --font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
        --font-size-h1: 2rem;
        --font-size-h2: 1.5rem;
        --font-size-body: 1rem;

        --space-1: 0.5rem;
        --space-2: 1rem;
        --space-3: 1.5rem;
        --space-4: 2rem;

        --radius: 0.75rem;
        --shadow-card: 0 4px 12px rgba(0, 0, 0, 0.3);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--color-bg);
        color: var(--color-text);
        font-family: var(--font-family);
        font-size: var(--font-size-body);
        line-height: 1.6;
      }

      header {
        padding: var(--space-4) var(--space-3);
        border-bottom: 1px solid var(--color-border);
      }

      header h1 {
        margin: 0 0 var(--space-1) 0;
        font-size: var(--font-size-h1);
      }

      header p {
        margin: 0;
        color: var(--color-text-muted);
      }

      main {
        max-width: 960px;
        margin: 0 auto;
        padding: var(--space-4) var(--space-3);
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
        gap: var(--space-3);
      }

      .card {
        display: block;
        background: var(--color-bg-card);
        border: 1px solid var(--color-border);
        border-radius: var(--radius);
        box-shadow: var(--shadow-card);
        padding: var(--space-3);
        text-decoration: none;
        color: var(--color-text);
        transition: transform 0.15s ease, border-color 0.15s ease;
      }

      .card:hover {
        transform: translateY(-2px);
        border-color: var(--color-accent);
      }

      .card h2 {
        margin: 0 0 var(--space-1) 0;
        font-size: var(--font-size-h2);
      }

      .card p {
        margin: 0;
        color: var(--color-text-muted);
        font-size: 0.9rem;
      }

      .card .tag {
        display: inline-block;
        margin-top: var(--space-2);
        padding: 2px 10px;
        border-radius: 999px;
        background: rgba(99, 102, 241, 0.15);
        color: var(--color-accent);
        font-size: 0.75rem;
      }

      .placeholder {
        border-style: dashed;
        opacity: 0.5;
      }

      footer {
        text-align: center;
        padding: var(--space-4) var(--space-3);
        color: var(--color-text-muted);
        font-size: 0.85rem;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Web100</h1>
      <p>一系列免安裝、免註冊，手機瀏覽器打開就能玩的小遊戲與實用工具。</p>
    </header>

    <main>
      <div class="grid">
        <a class="card" href="/avalon/">
          <h2>阿瓦隆語音主持</h2>
          <p>設定人數與角色，自動唸出主持人旁白台詞，不用自己背稿，直接開局。</p>
          <span class="tag">聚會遊戲</span>
        </a>

        <div class="card placeholder">
          <h2>搶答遊戲</h2>
          <p>多人現場搶答工具，掃 QR code 加入房間即可遊玩。（開發中）</p>
          <span class="tag">即將推出</span>
        </div>
      </div>
    </main>

    <footer>
      &copy; 2026 Web100 Series
    </footer>
  </body>
</html>
